---
name: CI

on:
  pull_request:
    branches:
      - main
      - "v*"

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  validate-lint-and-unit-test:
    name: Run validation, linters and unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        php-version: ["8.4", "8.5"]
        experimental: [false]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          extensions: "grpc"

      - name: Validate
        run: make validate-composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Lint
        run: make lint

      - name: Check repo status
        uses: cerbos/actions/check-repo-status@0c9f5496bb1c168e663ad7ecb99ad0d2b947ba46 # main

      - name: Run unit tests
        run: make test
