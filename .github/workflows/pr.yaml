---
name: CI

on:
  pull_request:
    branches:
      - main
      - "v*"

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  validate-lint-and-unit-test:
    name: Run validation, linters and unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        php-version: ["8.4", "8.5"]
        experimental: [false]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          extensions: "grpc"

      - name: Validate
        run: make validate-composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Lint
        run: make lint

      - name: Check repo status
        uses: cerbos/actions/check-repo-status@d2c46d81505b3c938d9eaa51af6d5ef4020cd4bf # main

      - name: Run unit tests
        run: make test
